<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Times Table</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000000; /* Pure black for OLED */
            color: #ffffff; /* Pure white text */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* Safe area for iPhone 15 Pro Clock/Island */
        .spacer { height: 28%; }

        .container {
            width: 85%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 25px 0;
            font-size: 48px; /* Large font for lockscreen visibility */
            font-weight: 500;
        }

        .prayer-name { text-align: left; }
        .prayer-time { text-align: right; font-weight: 700; }

        .footer {
            margin-top: auto;
            margin-bottom: 80px;
            font-size: 24px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="spacer"></div>

    <div class="container">
        <div class="header" id="date-label">Today's Times</div>
        <table id="prayer-table">
            </table>
    </div>

    <div class="footer">Chelambra, Kozhikode</div>

    <script>
        function convertTo12Hour(time24) {
            let [hours, minutes] = time24.split(':');
            let modifier = +hours >= 12 ? 'PM' : 'AM';
            hours = (+hours % 12) || 12;
            return `${hours}:${minutes} ${modifier}`;
        }

        async function getTimes() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Kozhikode&country=India&method=3');
                const data = await res.json();
                const timings = data.data.timings;
                
                const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
                const table = document.getElementById('prayer-table');
                
                table.innerHTML = prayers.map(p => `
                    <tr>
                        <td class="prayer-name">${p}</td>
                        <td class="prayer-time">${convertTo12Hour(timings[p])}</td>
                    </tr>
                `).join('');

                document.getElementById('date-label').innerText = data.data.date.readable;
            } catch (e) {
                document.getElementById('date-label').innerText = "Error Loading Times";
            }
        }

        getTimes();
    </script>
</body>
</html>
