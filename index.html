<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Life Cal</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #007AFF;
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Dynamic sizing based on URL */
            width: 100vw; height: 100vh;
            overflow: hidden;
        }

        /* 25% Top Margin for iPhone Clock */
        .spacer { height: 25%; width: 100%; }

        .container {
            width: 85%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .label { font-size: 32px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .goal-name { font-size: 80px; font-weight: 800; color: var(--accent); margin-top: -10px; }
        
        .countdown { font-size: 120px; font-weight: 900; }
        .days-text { font-size: 40px; color: #888; margin-top: -20px; }

        .progress-container {
            width: 100%; height: 15px;
            background: #222; border-radius: 10px;
            margin-top: 20px;
        }
        .progress-bar {
            height: 100%; background: var(--accent);
            border-radius: 10px; transition: width 1s ease;
        }
    </style>
</head>
<body>

    <div class="spacer"></div>

    <div class="container">
        <div class="label">Target Goal</div>
        <div id="goal-text" class="goal-name">Loading...</div>

        <div id="days-count" class="countdown">0</div>
        <div class="days-text">Days Remaining</div>

        <div class="progress-container">
            <div id="bar" class="progress-bar" style="width: 0%"></div>
        </div>
    </div>

    <script>
        // Get data from the URL
        const params = new URLSearchParams(window.location.search);
        const goal = params.get('goal') || "My Project";
        const goalDate = new Date(params.get('goal_date') || "2026-12-31");
        const startDate = new Date(params.get('start_date') || "2026-01-01");
        const today = new Date();

        // Calculate Days
        const totalDuration = goalDate - startDate;
        const timePassed = today - startDate;
        const timeLeft = goalDate - today;
        
        const daysLeft = Math.ceil(timeLeft / (1000 * 60 * 60 * 24));
        const progress = Math.min(100, Math.max(0, (timePassed / totalDuration) * 100));

        // Update DOM
        document.getElementById('goal-text').innerText = goal;
        document.getElementById('days-count').innerText = daysLeft > 0 ? daysLeft : 0;
        document.getElementById('bar').style.width = progress + "%";
        
        // Handle custom sizing from URL
        if(params.get('width')) document.body.style.width = params.get('width') + "px";
        if(params.get('height')) document.body.style.height = params.get('height') + "px";
    </script>
</body>
</html>
